services:
  postgres:
    image: postgres:16
    container_name: tr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tr}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - tr_postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5

  tr-api:
    build: .
    container_name: tr-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8090
      TR_DEPLOYMENT_MODE: local
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-tr}
      TR_DEFAULT_SUBJECT: ${TR_DEFAULT_SUBJECT:-local-dev-user}
      TR_DEFAULT_TENANT: ${TR_DEFAULT_TENANT:-public}
      TR_DEDUPE_WINDOW_SEC: ${TR_DEDUPE_WINDOW_SEC:-0}
      TR_STALE_CHECKPOINT_MINUTES: ${TR_STALE_CHECKPOINT_MINUTES:-20}
      NODE_ENV: production
    ports:
      - "${TR_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/healthz"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  tr_postgres_data:
